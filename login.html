<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – HealthPulse</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Specific styles for the login validation */
        .error {
            color: #ff4d4d;
            font-size: 0.75rem;
            margin-top: 4px;
            min-height: 1rem; /* Prevents layout jump when error appears */
        }

        input.error-border {
            border-color: #ff4d4d !important;
            background-color: #fffafa;
        }

        /* Center the logo circle in the auth card */
        .auth-logo .logo-circle {
            margin: 0 auto 12px auto;
        }
    </style>
</head>
<body>

<div class="form-page-wrap">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-circle">VB</div>
            <h2>HealthPulse</h2>
            <p>Personal Health Tracking & Awareness</p>
        </div>

        <form id="loginForm" novalidate> <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                <div id="emailError" class="error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <div id="passwordError" class="error"></div>
            </div>

            <button type="submit" class="btn-primary">Sign In →</button>

        </form>

        <p class="auth-switch">
            Don't have an account? <a href="register.html">Create one</a>
        </p>

    </div>
</div>

<script>
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    // 1. Function to clear errors when user starts typing
    const clearError = (input, errorDisplay) => {
        input.classList.remove("error-border");
        errorDisplay.textContent = "";
    };

    emailInput.addEventListener("input", () => clearError(emailInput, emailError));
    passwordInput.addEventListener("input", () => clearError(passwordInput, passwordError));

    // 2. Form Submit Logic
    loginForm.addEventListener("submit", function(e) {
        e.preventDefault(); 

        // Reset UI before checking
        emailError.textContent = "";
        passwordError.textContent = "";
        emailInput.classList.remove("error-border");
        passwordInput.classList.remove("error-border");

        let isValid = true;
        const emailValue = emailInput.value.trim();
        const passwordValue = passwordInput.value.trim();

        // 3. Robust Email Validation
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailValue === "") {
            emailError.textContent = "Email is required";
            emailInput.classList.add("error-border");
            isValid = false;
        } else if (!emailPattern.test(emailValue)) {
            emailError.textContent = "Please enter a valid email address";
            emailInput.classList.add("error-border");
            isValid = false;
        }

        // 4. Password Validation
        if (passwordValue === "") {
            passwordError.textContent = "Password is required";
            passwordInput.classList.add("error-border");
            isValid = false;
        } else if (passwordValue.length < 6) {
            passwordError.textContent = "Password must be at least 6 characters";
            passwordInput.classList.add("error-border");
            isValid = false;
        }

        // 5. Successful Login Redirect
        if (isValid) {
            // Optional: Store name in localStorage for the dashboard
            localStorage.setItem("userName", "User"); 
            window.location.href = "dashboard.html";
        }
    });
</script>

</body>
</html>
